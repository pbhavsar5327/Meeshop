<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Order Placed! – MeeShop</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="css/responsive.css"/>
  <style>
    .success-page{text-align:center;padding:80px 20px;}
    .success-anim{font-size:90px;animation:popIn 0.6s ease;margin-bottom:24px;}
    @keyframes popIn{0%{transform:scale(0)}60%{transform:scale(1.15)}100%{transform:scale(1)}}
    .success-page h1{font-family:'Playfair Display',serif;font-size:38px;color:var(--text);margin-bottom:12px;}
    .success-page h1 span{color:var(--success);}
    .success-page p{font-size:16px;color:var(--text-muted);max-width:480px;margin:0 auto 30px;}
    .order-id-box{background:var(--bg-soft);border:1.5px dashed var(--primary);border-radius:var(--radius);padding:18px 28px;display:inline-block;margin-bottom:32px;}
    .order-id-box strong{font-size:20px;color:var(--primary);}
    .order-id-box small{display:block;font-size:13px;color:var(--text-muted);}
    .order-summary-card{background:white;border-radius:var(--radius-lg);box-shadow:var(--card-shadow);max-width:560px;margin:0 auto 36px;text-align:left;overflow:hidden;}
    .osc-header{background:linear-gradient(135deg,var(--primary),var(--secondary));padding:18px 24px;color:white;}
    .osc-header h3{font-size:16px;font-weight:700;}
    .osc-body{padding:20px 24px;}
    .osc-item{display:flex;gap:12px;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--border-soft);}
    .osc-item:last-child{border:none;margin:0;padding:0;}
    .osc-item img{width:54px;height:58px;object-fit:cover;border-radius:var(--radius-sm);}
    .osc-item-name{font-size:14px;font-weight:600;}
    .osc-item-price{font-size:14px;color:var(--primary);font-weight:700;}
    .osc-addr{background:var(--bg-soft);border-radius:var(--radius-sm);padding:14px;margin-bottom:16px;font-size:13px;line-height:1.8;}
    .osc-addr strong{font-size:14px;}
    .success-actions{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;}
    .delivery-timeline{display:flex;justify-content:center;gap:0;margin-bottom:36px;}
    .tl-step{text-align:center;position:relative;}
    .tl-step::after{content:'';position:absolute;top:16px;left:50%;width:100%;height:2px;background:var(--border);z-index:0;}
    .tl-step:last-child::after{display:none;}
    .tl-icon{width:32px;height:32px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:14px;margin:0 auto 8px;position:relative;z-index:1;}
    .tl-step.done .tl-icon{background:var(--success);color:white;}
    .tl-step.active .tl-icon{background:var(--primary);color:white;}
    .tl-label{font-size:11px;color:var(--text-muted);white-space:nowrap;padding:0 12px;}
  </style>
</head>
<body>
<div id="nav-placeholder"></div>

<section class="section success-page">
  <div class="success-anim">🎉</div>
  <h1>Order <span>Confirmed!</span></h1>
  <p>Thank you for shopping with MeeShop! Your order has been placed and will be delivered soon.</p>
  <div class="order-id-box">
    <strong id="orderId">ORD123456789</strong>
    <small id="orderDate">Placed on —</small>
  </div>

  <div class="delivery-timeline">
    <div class="tl-step done"><div class="tl-icon">✓</div><div class="tl-label">Order Placed</div></div>
    <div class="tl-step active"><div class="tl-icon">📦</div><div class="tl-label">Processing</div></div>
    <div class="tl-step"><div class="tl-icon">🚚</div><div class="tl-label">Shipped</div></div>
    <div class="tl-step"><div class="tl-icon">🏠</div><div class="tl-label">Delivered</div></div>
  </div>

  <div class="order-summary-card" id="orderCard"></div>

  <div class="success-actions">
    <a href="orders.html" class="btn btn-primary btn-lg">View My Orders</a>
    <a href="index.html" class="btn btn-secondary btn-lg">Continue Shopping</a>
  </div>
</section>

<div id="footer-placeholder"></div>
<script src="js/data.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    initNav('');
    const order = JSON.parse(localStorage.getItem('ms_last_order') || 'null');
    if (!order) { window.location.href = 'index.html'; return; }
    document.getElementById('orderId').textContent = order.id;
    document.getElementById('orderDate').textContent = 'Placed on ' + order.date;
    const addr = order.address || {};
    document.getElementById('orderCard').innerHTML = `
      <div class="osc-header"><h3>📦 Delivering to: ${addr.name || ''}</h3></div>
      <div class="osc-body">
        ${addr.addr1 ? `<div class="osc-addr"><strong>${addr.name}</strong>${addr.addr1}${addr.addr2?', '+addr.addr2:''}<br>${addr.city}, ${addr.state} – ${addr.pin}<br>📞 ${addr.phone}</div>` : ''}
        ${(order.items||[]).map(i=>`<div class="osc-item"><img src="${i.image}" alt="${i.name}"><div><div class="osc-item-name">${i.name}</div><div style="font-size:12px;color:var(--text-muted)">Qty: ${i.qty}</div><div class="osc-item-price">₹${(i.price*i.qty).toLocaleString()}</div></div></div>`).join('')}
        <div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--border-soft);display:flex;justify-content:space-between;font-weight:700"><span>Total Paid</span><span style="color:var(--primary)">₹${(order.total||0).toLocaleString()}</span></div>
      </div>`;
  });
</script>
</body>
</html>
