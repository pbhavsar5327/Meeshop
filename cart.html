<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cart – MeeShop</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="css/cart.css"/>
  <link rel="stylesheet" href="css/responsive.css"/>
</head>
<body>
<div id="nav-placeholder"></div>
<div id="bottom-nav-placeholder"></div>

<div class="breadcrumb"><div class="container"><p><a href="index.html">Home</a><span>/</span> Shopping Cart</p></div></div>

<section class="section">
  <div class="container">
    <h1 class="cart-title">Shopping Cart <span id="cartCountTitle"></span></h1>
    <div class="cart-layout" id="cartLayout">
      <div class="cart-items" id="cartItems"></div>
      <div class="cart-summary" id="cartSummary"></div>
    </div>
    <div class="empty-state" id="cartEmpty" style="display:none">
      <div class="empty-state-icon">🛒</div>
      <h3>Your cart is empty</h3>
      <p>Looks like you haven't added anything yet.</p>
      <a href="products.html" class="btn btn-primary">Start Shopping</a>
    </div>
  </div>
</section>

<div id="footer-placeholder"></div>
<script src="js/data.js"></script>
<script src="js/cart.js"></script>
</body>
</html>
